<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Evara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --green-light: #DCF8C6;
      --ink: #1a1a2e;
      --ink-light: #4a4a5a;
      --cream: #faf9f6;
      --warm: #f5f0e8;
      --accent: #FF6B35;
      --card-bg: #ffffff;
      --radius: 16px;
      --shadow: 0 4px 30px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--cream);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .header {
      background: rgba(250,249,246,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--green-dark);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .header-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink-light);
      border-left: 2px solid var(--warm);
      padding-left: 16px;
      flex: 1;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--ink-light);
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--warm);
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .btn-logout {
      background: none;
      border: 1.5px solid #e74c3c;
      color: #e74c3c;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-logout:hover {
      background: #e74c3c;
      color: white;
    }

    /* ─── Container ─── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    /* ─── Welcome Card ─── */
    .welcome-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      text-align: center;
    }
    .welcome-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .welcome-card p {
      color: var(--ink-light);
      font-size: 0.95rem;
    }

    /* ─── Loading Spinner ─── */
    .spinner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--warm);
      border-top-color: var(--green-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-msg {
      color: var(--ink-light);
      font-size: 0.9rem;
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .header { padding: 12px 16px; gap: 10px; }
      .header-title { display: none; }
      .container { padding: 20px 12px 60px; }
      .user-info .user-email { display: none; }
    }
  </style>
</head>
<body>

  <!-- Loading state (shown while checking auth) -->
  <div id="loading-state" class="spinner-container">
    <div class="spinner"></div>
    <div class="loading-msg">Loading...</div>
  </div>

  <!-- Main content (hidden until auth is confirmed) -->
  <div id="app" style="display: none;">
    <div class="header">
      <a href="/" class="logo">evar<span>a</span></a>
      <div class="header-title">Admin Dashboard</div>
      <div class="user-info">
        <div class="user-avatar" id="user-avatar"></div>
        <span class="user-email" id="user-email"></span>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </div>

    <div class="container">
      <div class="welcome-card">
        <h2 id="welcome-heading">Welcome back</h2>
        <p>You are signed in as the Evara admin.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    let supabaseClient = null;
    let currentUser = null;

    // ─── Initialize Supabase client with persistent session config ───
    async function initSupabase() {
      const res = await fetch('/api/admin-config');
      if (!res.ok) throw new Error('Failed to load config');
      const config = await res.json();

      supabaseClient = supabase.createClient(config.url, config.anonKey, {
        auth: {
          persistSession: true,
          storageKey: 'evara-admin-auth',
          autoRefreshToken: true,
          detectSessionInUrl: true,
        }
      });
    }

    // ─── Initialize auth state ───
    async function init() {
      const loadingState = document.getElementById('loading-state');
      const app = document.getElementById('app');

      try {
        await initSupabase();

        // 1. Check for existing session (restored from localStorage)
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
          showApp(session.user);
        } else {
          // No session — redirect to login
          window.location.href = '/admin-login.html';
          return;
        }

        // 2. Subscribe to auth state changes (handles token refresh, logout)
        supabaseClient.auth.onAuthStateChange((_event, session) => {
          if (session) {
            currentUser = session.user;
            updateUserUI(session.user);
          } else {
            // Session ended (user logged out) — redirect to login
            window.location.href = '/admin-login.html';
          }
        });
      } catch (e) {
        console.error('Init error:', e);
        window.location.href = '/admin-login.html';
      }
    }

    // ─── Show the app after auth is confirmed ───
    function showApp(user) {
      currentUser = user;
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      updateUserUI(user);
    }

    // ─── Update user info in the header ───
    function updateUserUI(user) {
      const emailEl = document.getElementById('user-email');
      const avatarEl = document.getElementById('user-avatar');
      const headingEl = document.getElementById('welcome-heading');

      emailEl.textContent = user.email || '';

      if (user.user_metadata && user.user_metadata.avatar_url) {
        avatarEl.innerHTML = '<img src="' + escapeAttr(user.user_metadata.avatar_url) + '" alt="Avatar">';
      }

      const name = (user.user_metadata && user.user_metadata.full_name) || user.email || 'Admin';
      headingEl.textContent = 'Welcome back, ' + name;
    }

    // ─── Logout — the ONLY way the session should end ───
    async function handleLogout() {
      await supabaseClient.auth.signOut();
      // onAuthStateChange will handle the redirect to login
    }

    // ─── Helpers ───
    function escapeAttr(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ─── Start ───
    init();
  </script>
</body>
</html>
